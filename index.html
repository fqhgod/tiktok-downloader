<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tiktok Downloader - TikTok No Watermark</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TikTok Downloader</h1>
        <p>Tempelkan link video TikTok untuk mendownload tanpa watermark.</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/...">
            <button id="btnDownload" onclick="cekVideo()">Cek Video</button>
        </div>

        <div id="status" style="margin-top: 20px; font-weight: bold;"></div>

        <div id="result" class="result-container">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
