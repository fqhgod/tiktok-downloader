<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader - No Watermark</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TikTok Downloader</h1>
        <p>Tempelkan link video TikTok untuk mendownload tanpa watermark.</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/...">
            <button id="btnDownload" onclick="cekVideo()">Cek Video</button>
        </div>

        <div id="status"></div>
        <div id="result" class="result-container"></div>

        <footer class="footer">
            <p>Made by faqihfauzi</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
